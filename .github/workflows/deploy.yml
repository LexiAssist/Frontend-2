name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/lexiassist/frontend-2

jobs:
  ci:
    name: Check, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_API_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_API_GATEWAY_URL }}
          NEXT_PUBLIC_API_PROXY_URL: ${{ secrets.NEXT_PUBLIC_API_PROXY_URL }}
          NEXT_PUBLIC_USE_MOCK_API: false

  deploy:
    name: Build Image & Deploy
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/lexiassist/frontend-2:latest
          build-args: |
            NEXT_PUBLIC_API_GATEWAY_URL=${{ secrets.NEXT_PUBLIC_API_GATEWAY_URL }}
            NEXT_PUBLIC_API_PROXY_URL=${{ secrets.NEXT_PUBLIC_API_PROXY_URL }}
            NEXT_PUBLIC_USE_MOCK_API=false

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_SERVER_HOST }}
          username: root
          key: ${{ secrets.FRONTEND_SERVER_SSH_KEY }}
          script: |
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/lexiassist/frontend-2:latest
            docker stop lexiassist-frontend 2>/dev/null || true
            docker rm lexiassist-frontend 2>/dev/null || true
            docker run -d \
              --name lexiassist-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              ghcr.io/lexiassist/frontend-2:latest
            docker image prune -f
